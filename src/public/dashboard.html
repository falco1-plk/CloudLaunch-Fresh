<!DOCTYPE html>
<html>
<head>
<title>CloudLaunch Dashboard</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    text-align:center;
}

h1 {
    margin-top:80px;
    font-size:42px;
    color:#38bdf8;
}

.card {
    margin:60px auto;
    padding:50px;
    width:60%;
    background:#0b1220;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.card h2 {
    margin-bottom:10px;
}

.card p {
    color:#94a3b8;
}

a {
    display:inline-block;
    margin-top:20px;
    padding:15px 35px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>CloudLaunch Dashboard</h1>

<div class="card">
    <h2>DevOps Automation System</h2>
    <p>Manage containers, deploy applications and monitor logs</p>
    <a href="/admin">Open Control Panel</a>
</div>

</body>
</html>
