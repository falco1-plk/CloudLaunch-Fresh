<!DOCTYPE html>
<html>
<head>
<title>DevOps Control Panel</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#020617,#1e293b);
    color:white;
    text-align:center;
}

h1 {
    margin-top:40px;
    color:#22d3ee;
}

.status {
    margin:20px;
    font-size:18px;
}

.running { color:#22c55e; }
.stopped { color:#ef4444; }

button {
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.start { background:#22c55e; }
.stop { background:#ef4444; }
.restart { background:#3b82f6; }
.deploy { background:#f59e0b; }

.logs {
    width:80%;
    height:300px;
    margin:40px auto;
    background:black;
    color:#00ff88;
    padding:20px;
    border-radius:10px;
    text-align:left;
    overflow:auto;
    font-family:monospace;
}
</style>

<script>
function action(cmd){
    fetch("/"+cmd).then(()=>loadAll());
}

function loadLogs(){
    fetch("/logs")
    .then(res=>res.text())
    .then(data=>{
        document.getElementById("logs").innerText=data;
    });
}

function loadStatus(){
    fetch("/status")
    .then(res=>res.text())
    .then(data=>{
        let el = document.getElementById("status");
        if(data.includes("Up")){
            el.innerText = "Running";
            el.className = "status running";
        } else {
            el.innerText = "Stopped";
            el.className = "status stopped";
        }
    });
}

function loadAll(){
    loadLogs();
    loadStatus();
}

setInterval(loadAll,2000);
</script>

</head>

<body onload="loadAll()">

<h1>DevOps Control Panel</h1>

<div id="status" class="status">Checking...</div>

<div>
    <button class="start" onclick="action('start')">Start</button>
    <button class="stop" onclick="action('stop')">Stop</button>
    <button class="restart" onclick="action('restart')">Restart</button>
    <button class="deploy" onclick="action('deploy')">Deploy</button>
</div>

<div id="logs" class="logs">Loading logs...</div>

</body>
</html>
