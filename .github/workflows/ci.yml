name: CloudLaunch CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 3.109.32.121
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            if [ ! -d "CloudLaunch-Fresh" ]; then
              git clone https://github.com/falco1-plk/CloudLaunch-Fresh.git
            fi

            cd CloudLaunch-Fresh
            git pull origin main

            sudo docker stop cloudlaunch-container || true
            sudo docker rm cloudlaunch-container || true

            sudo docker build -t cloudlaunch .

            sudo docker run -d -p 4000:3000 --name cloudlaunch-container cloudlaunch