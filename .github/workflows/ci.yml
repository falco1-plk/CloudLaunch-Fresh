name: CloudLaunch CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 3.109.32.121
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "CloudLaunch-Fresh" ]; then
              git clone https://github.com/falco1-plk/CloudLaunch-Fresh.git
            fi

            # Go to project folder
            cd /home/ubuntu/CloudLaunch-Fresh

            # Pull latest code
            git pull origin main

            # Stop and remove old container
            sudo docker rm -f cloudlaunch-container || true

            # Build new image
            sudo docker build -t cloudlaunch .

            # Run container
            sudo docker run -d -p 4000:80 --name cloudlaunch-container cloudlaunch